schema: spec-driven

context: |
  Project: Refurbished Marketplace
  Domain: multi-service e-commerce marketplace

  Development Workflow:
  - devenv.nix manages local development tooling; if there are tools not found, write to devenv.nix and do `direnv reload`
  - Go multi-module workspace. Try to use the provided `tidy` script in devenv
  - Kubernetes-based development with Tilt, Helm, CloudNativePG, Strimzi, Kafka UI, and Debezium. Therefore, don't try to compile and run any go services in my local machine (tests is okay).
  - HTML-first web edge using chi, templ, Tailwind CSS, Datastar, and vendored DatastarUI-style components. All the templ and Tailwind generation will be handled by Tilt, no need to touch on that.
  - gRPC for internal service-to-service traffic. If you need to generate the proto, use the provided script `generate-proto` in devenv
  - PostgreSQL with goose migrations and sqlc queries. If you need to use sqlc, use the provided script `sqlc-gen` in devenv

  Repo conventions:
  - Keep service code under services/<name>/ and private code in internal/.
  - Keep SQL and migrations service-local under services/<service>/db/
  - Keep tests under services/<service>/tests/
  - Keep protobuf contracts under shared/proto/<domain>/v1/
  - Keep docs/ for stable architecture notes, Mermaid diagrams, ADR-style decisions, and service ownership notes

  Code style:
  - Don't format the code because I already have a git-hook to autoformat for me.
  - Separate files to logic-related, dont keep in one big file.
  - Don't add tests for everything when implementing, only do so when prompted
  - Do not try to add compability code, when possible, remove the legacy and strive for the newest version.

rules:
  proposal:
    - Keep proposals concise and tied to the real repo state
    - Include explicit non-goals when scope can expand
    - Separate change proposals from durable docs
  design:
    - Keep service-local persistence and eventing details with the owning service
    - Capture repo-wide documentation boundaries when relevant
    - Use context7 mcp server to look up documentation if unsure
  tasks:
    - Break work into small, verifiable steps
    - Prefer tasks that map directly to repo structure and service ownership
