schema: spec-driven

context: |
  Project: Refurbished Marketplace
  Domain: multi-service e-commerce marketplace

  Development Workflow:
  - devenv.nix manages local development tooling; if tools are missing, add them to devenv.nix and run `direnv reload`
  - Go multi-module workspace. Prefer the devenv `tidy` script for `go work sync`
  - Local Kubernetes is Colima/k3s with Argo CD (`infra/argocd/local/`). Bootstrap via devenv `bootstrap-local-argocd`; do not try to compile and run Go services as host processes (tests are okay)
  - Chart `values.yaml` is Colima-local (short image names, ambient mesh, Istio ingress on `shop.dev.phuchoang.sbs` / `pay.dev.phuchoang.sbs`). Staging overlays live in `values-staging.yaml`
  - Local images: devenv `build-images` / `./tools/build-images.sh` (shared catalog with GHCR release CI via `--matrix`)
  - Browser access locally is Cloudflare Tunnel → Istio Gateway (not per-service port-forwards)
  - HTML-first web edge using chi, templ, Tailwind CSS, Datastar, and vendored DatastarUI-style components. Prefer devenv tasks `web:templ` / `web:tailwind` (or `templ-gen` / `tailwind-gen`) rather than hand-running codegen unless asked
  - gRPC for internal service-to-service traffic. Prefer devenv `generate-proto` for protobuf codegen
  - PostgreSQL with goose migrations and sqlc queries. Prefer devenv `sqlc-gen`
  - Staging GitOps: `infra/argocd/staging/` (production hostnames/GHCR overlays). Production app-of-apps is not in-tree yet

  Repo conventions:
  - Keep service code under services/<name>/ and private code in internal/
  - Keep SQL and migrations service-local under services/<service>/db/
  - Keep tests under services/<service>/tests/
  - Keep protobuf contracts under shared/proto/<domain>/v1/
  - Keep docs/ for stable architecture notes, Mermaid diagrams, ADR-style decisions, and service ownership notes
  - Keep operator/app Helm charts under infra/charts/; local/staging Argo under infra/argocd/{local,staging}/
  - Keep bootstrap/dev shell scripts under tools/ (except Go modules like payment-gateway-simulator)

  Code style:
  - Don't format the code because I already have a git-hook to autoformat for me.
  - Separate files to logic-related, dont keep in one big file.
  - Don't add tests for everything when implementing, only do so when prompted
  - Do not try to add compatibility code; when possible, remove the legacy and strive for the newest version.

rules:
  proposal:
    - Keep proposals concise and tied to the real repo state
    - Include explicit non-goals when scope can expand
    - Separate change proposals from durable docs
  design:
    - Keep service-local persistence and eventing details with the owning service
    - Capture repo-wide documentation boundaries when relevant
    - Use context7 mcp server to look up documentation if unsure
  tasks:
    - Break work into small, verifiable steps
    - Prefer tasks that map directly to repo structure and service ownership
