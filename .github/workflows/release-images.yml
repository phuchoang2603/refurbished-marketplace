name: Release Images

on:
  push:
    branches: [main]
    paths:
      - infra/docker/**
      - services/**
      - shared/**
      - tools/**
      - go.work
      - go.work.sum
      - "**/go.mod"
      - .github/workflows/release-images.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: web
            dockerfile: infra/docker/web.Dockerfile
            build_args: ""
          - image: users
            dockerfile: infra/docker/go-service.Dockerfile
            build_args: |
              BUILD_PKG=./services/users/cmd/users
              BUILD_BIN=users
              EXPOSE_PORT=9091
          - image: users-migrator
            dockerfile: infra/docker/goose-migrator.Dockerfile
            build_args: MIGRATIONS_DIR=services/users/db/migrations
          - image: products
            dockerfile: infra/docker/go-service.Dockerfile
            build_args: |
              BUILD_PKG=./services/products/cmd/products
              BUILD_BIN=products
              EXPOSE_PORT=9092
          - image: products-migrator
            dockerfile: infra/docker/goose-migrator.Dockerfile
            build_args: MIGRATIONS_DIR=services/products/db/migrations
          - image: orders
            dockerfile: infra/docker/go-service.Dockerfile
            build_args: |
              BUILD_PKG=./services/orders/cmd/orders
              BUILD_BIN=orders
              EXPOSE_PORT=9093
          - image: orders-migrator
            dockerfile: infra/docker/goose-migrator.Dockerfile
            build_args: MIGRATIONS_DIR=services/orders/db/migrations
          - image: cart
            dockerfile: infra/docker/go-service.Dockerfile
            build_args: |
              BUILD_PKG=./services/cart/cmd/cart
              BUILD_BIN=cart
              EXPOSE_PORT=9094
          - image: payment
            dockerfile: infra/docker/go-service.Dockerfile
            build_args: |
              BUILD_PKG=./services/payment/cmd/payment
              BUILD_BIN=payment
              EXPOSE_PORT=9096
          - image: payment-migrator
            dockerfile: infra/docker/goose-migrator.Dockerfile
            build_args: MIGRATIONS_DIR=services/payment/db/migrations
          - image: payment-gateway-simulator
            dockerfile: infra/docker/go-service.Dockerfile
            build_args: |
              BUILD_PKG=./tools/payment-gateway-simulator
              BUILD_BIN=payment-gateway-simulator
              EXPOSE_PORT=8097
          - image: connect-debezium
            dockerfile: infra/docker/connect-debezium.Dockerfile
            build_args: ""
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: ${{ matrix.build_args }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.image }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}/${{ matrix.image }}:main
