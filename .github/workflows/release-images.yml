name: Release Images

on:
  push:
    branches: [main]
    paths:
      - infra/docker/**
      - services/**
      - shared/**
      - tools/**
      - go.work
      - go.work.sum
      - "**/go.mod"
      - .github/workflows/release-images.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.set.outputs.images }}
    steps:
      - uses: actions/checkout@v6
      - id: set
        run: |
          {
            echo 'images<<EOF'
            ./tools/build-images.sh --matrix
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

  release:
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.matrix.outputs.images) }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: ${{ matrix.build_args }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.image }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}/${{ matrix.image }}:main
