name: Lint

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: "1.26.1"
  GO_MODULE_GLOBS: >-
    ./services/users/...
    ./services/products/...
    ./services/orders/...
    ./services/cart/...
    ./services/payment/...
    ./services/web/...
    ./shared/auth/...
    ./shared/messaging/...
    ./shared/proto/...
    ./shared/testutil/postgres/...
    ./shared/testutil/kafka/...
    ./shared/testutil/redis/...
    ./tools/payment-gateway-simulator/...

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: ${{ env.GO_MODULE_GLOBS }}
      - name: Vet and build
        run: |
          go vet ${{ env.GO_MODULE_GLOBS }}
          go build ${{ env.GO_MODULE_GLOBS }}
