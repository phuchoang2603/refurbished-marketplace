name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Mondays at 0000 UTC — full govulncheck scan (path filters skipped)
    - cron: "0 0 * * 1"

permissions:
  contents: read

env:
  GO_VERSION: "1.26.2"
  GO_CACHE_DEPENDENCY_PATH: |
    go.work
    **/go.sum
  GO_MODULE_GLOBS: >-
    ./services/users/...
    ./services/products/...
    ./services/orders/...
    ./services/cart/...
    ./services/payment/...
    ./services/web/...
    ./shared/auth/...
    ./shared/db/...
    ./shared/grpcerr/...
    ./shared/messaging/...
    ./shared/proto/...
    ./shared/runtime/...
    ./shared/testutil/postgres/...
    ./shared/testutil/kafka/...
    ./shared/testutil/redis/...
    ./tools/payment-gateway-simulator/...

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: reviewdog/action-golangci-lint@v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          go_version: ${{ env.GO_VERSION }}
          golangci_lint_version: v2.12.2
          golangci_lint_flags: --config=.golangci.yml ${{ env.GO_MODULE_GLOBS }}
          reporter: ${{ github.event_name == 'pull_request' && 'github-pr-review' || 'github-check' }}
          filter_mode: diff_context
          fail_level: error

  changes:
    runs-on: ubuntu-latest
    outputs:
      users: ${{ steps.filter.outputs.users }}
      products: ${{ steps.filter.outputs.products }}
      orders: ${{ steps.filter.outputs.orders }}
      payment: ${{ steps.filter.outputs.payment }}
      cart: ${{ steps.filter.outputs.cart }}
      web: ${{ steps.filter.outputs.web }}
      helm: ${{ steps.filter.outputs.helm }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            users:
              - 'services/users/**'
              - 'shared/proto/**'
              - 'shared/auth/**'
              - 'shared/db/**'
              - 'shared/grpcerr/**'
              - 'shared/runtime/**'
              - 'shared/testutil/postgres/**'
            products:
              - 'services/products/**'
              - 'shared/proto/**'
              - 'shared/messaging/**'
              - 'shared/db/**'
              - 'shared/grpcerr/**'
              - 'shared/runtime/**'
              - 'shared/testutil/postgres/**'
              - 'shared/testutil/kafka/**'
            orders:
              - 'services/orders/**'
              - 'shared/proto/**'
              - 'shared/messaging/**'
              - 'shared/db/**'
              - 'shared/grpcerr/**'
              - 'shared/runtime/**'
              - 'shared/testutil/postgres/**'
              - 'shared/testutil/kafka/**'
            payment:
              - 'services/payment/**'
              - 'shared/proto/**'
              - 'shared/messaging/**'
              - 'shared/db/**'
              - 'shared/grpcerr/**'
              - 'shared/runtime/**'
              - 'shared/testutil/postgres/**'
              - 'shared/testutil/kafka/**'
            cart:
              - 'services/cart/**'
              - 'shared/proto/**'
              - 'shared/grpcerr/**'
              - 'shared/runtime/**'
              - 'shared/testutil/redis/**'
            web:
              - 'services/web/**'
              - 'shared/proto/**'
              - 'shared/auth/**'
            helm:
              - 'infra/charts/**'

  test:
    needs: changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - users
          - products
          - orders
          - payment
          - cart
          - web
    steps:
      - name: Skip when path filter does not match
        if: needs.changes.outputs[matrix.service] != 'true'
        run: echo "Skipping tests for ${{ matrix.service }}"

      - uses: actions/checkout@v6
        if: needs.changes.outputs[matrix.service] == 'true'

      - uses: actions/setup-go@v6
        if: needs.changes.outputs[matrix.service] == 'true'
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.GO_CACHE_DEPENDENCY_PATH }}

      - name: Test ${{ matrix.service }}
        if: needs.changes.outputs[matrix.service] == 'true'
        run: go test ./services/${{ matrix.service }}/...

  govulncheck:
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        service:
          - users
          - products
          - orders
          - payment
          - cart
          - web
    steps:
      - name: Skip when path filter does not match
        if: github.event_name != 'schedule' && needs.changes.outputs[matrix.service] != 'true'
        run: echo "Skipping govulncheck for ${{ matrix.service }}"

      - uses: actions/checkout@v6
        if: github.event_name == 'schedule' || needs.changes.outputs[matrix.service] == 'true'

      - uses: actions/setup-go@v6
        if: github.event_name == 'schedule' || needs.changes.outputs[matrix.service] == 'true'
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.GO_CACHE_DEPENDENCY_PATH }}

      - name: Run govulncheck
        if: github.event_name == 'schedule' || needs.changes.outputs[matrix.service] == 'true'
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck -C "services/${{ matrix.service }}" -format sarif ./... > govulncheck.sarif

      - name: Upload SARIF file
        if: github.event_name == 'schedule' || needs.changes.outputs[matrix.service] == 'true'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: govulncheck.sarif
          category: govulncheck-${{ matrix.service }}

  helm:
    needs: changes
    if: needs.changes.outputs.helm == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v4
        with:
          version: v3.17.3
      - name: Helm lint and template
        run: |
          set -euo pipefail
          namespace=ecommerce
          app_charts=(
            infra/charts/refurbished-marketplace-infra
            infra/charts/refurbished-marketplace
            infra/charts/kafka
          )
          values_file=infra/charts/refurbished-marketplace/values.yaml
          for chart in "${app_charts[@]}"; do
            helm lint "$chart" -f "$values_file"
            helm template test-release "$chart" -f "$values_file" --namespace "$namespace" > "/tmp/$(basename "$chart").yaml"
          done

          wrapper_charts=(
            "infra/charts/operators/external-secrets:operators"
            "infra/charts/operators/cnpg:operators"
            "infra/charts/operators/strimzi:operators"
            "infra/charts/observability:monitoring"
          )
          for item in "${wrapper_charts[@]}"; do
            chart="${item%%:*}"
            chart_namespace="${item##*:}"
            helm lint "$chart"
            helm template test-release "$chart" --namespace "$chart_namespace" > "/tmp/$(basename "$chart").yaml"
          done
      - name: Set up kubeconform
        uses: bmuschko/setup-kubeconform@v1
        with:
          kubeconform-version: "0.6.7"
      - name: Kubeconform
        run: |
          set -euo pipefail
          kubeconform -summary -ignore-missing-schemas \
            /tmp/refurbished-marketplace-infra.yaml \
            /tmp/refurbished-marketplace.yaml \
            /tmp/kafka.yaml \
            /tmp/external-secrets.yaml \
            /tmp/cnpg.yaml \
            /tmp/strimzi.yaml \
            /tmp/observability.yaml
