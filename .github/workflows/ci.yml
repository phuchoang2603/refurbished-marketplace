name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  checks: write

env:
  GO_VERSION: "1.26.1"
  GO_MODULE_GLOBS: >-
    ./services/users/...
    ./services/products/...
    ./services/orders/...
    ./services/cart/...
    ./services/payment/...
    ./services/web/...
    ./shared/auth/...
    ./shared/messaging/...
    ./shared/proto/...
    ./shared/testutil/postgres/...
    ./shared/testutil/kafka/...
    ./shared/testutil/redis/...
    ./tools/payment-gateway-simulator/...

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install golangci-lint and reviewdog
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          curl -sfL https://raw.githubusercontent.com/reviewdog/reviewdog/master/install.sh | sh -s -- -b "$(go env GOPATH)/bin" v0.20.3

      - name: golangci-lint
        id: golangci
        continue-on-error: true
        run: |
          set -o pipefail
          golangci-lint run --config=.golangci.yml --out-format=line-number \
            ${{ env.GO_MODULE_GLOBS }} 2>&1 | tee "${RUNNER_TEMP}/golangci.out"

      - name: Post inline review comments
        if: github.event_name == 'pull_request' && steps.golangci.outcome == 'failure'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          reviewdog -f=golangci-lint -name=golangci -reporter=github-pr-review \
            -filter-mode=diff_context -fail-level=none -level=error \
            < "${RUNNER_TEMP}/golangci.out" || true

      - name: Post lint summary on PR
        if: github.event_name == 'pull_request' && steps.golangci.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const output = fs.readFileSync(`${process.env.RUNNER_TEMP}/golangci.out`, 'utf8');
            const maxLen = 65000;
            const body = output.length > maxLen
              ? output.slice(0, maxLen) + '\n\n...(truncated)'
              : output;
            const issueCount = output.split('\n').filter((line) => /:\d+:\d+:/.test(line)).length;
            const marker = '<!-- golangci-lint-report -->';
            const message = [
              marker,
              '## golangci-lint findings',
              '',
              `Found ${issueCount} issue(s). Inline review comments appear on changed lines only.`,
              '',
              '<details>',
              `<summary>Full report</summary>`,
              '',
              '```',
              body,
              '```',
              '',
              '</details>',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((comment) => comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: message,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: message,
              });
            }

      - name: Post check annotations
        if: github.event_name == 'push' && steps.golangci.outcome == 'failure'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          reviewdog -f=golangci-lint -name=golangci -reporter=github-check \
            -filter-mode=nofilter -fail-level=none -level=error \
            < "${RUNNER_TEMP}/golangci.out" || true

      - name: Fail on lint errors
        if: steps.golangci.outcome == 'failure'
        run: exit 1

      - name: Vet and build
        run: |
          go vet ${{ env.GO_MODULE_GLOBS }}
          go build ${{ env.GO_MODULE_GLOBS }}

  changes:
    runs-on: ubuntu-latest
    outputs:
      users: ${{ steps.filter.outputs.users }}
      products: ${{ steps.filter.outputs.products }}
      orders: ${{ steps.filter.outputs.orders }}
      payment: ${{ steps.filter.outputs.payment }}
      cart: ${{ steps.filter.outputs.cart }}
      web: ${{ steps.filter.outputs.web }}
      helm: ${{ steps.filter.outputs.helm }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            users:
              - 'services/users/**'
              - 'shared/proto/**'
              - 'shared/auth/**'
              - 'shared/testutil/postgres/**'
            products:
              - 'services/products/**'
              - 'shared/proto/**'
              - 'shared/messaging/**'
              - 'shared/testutil/postgres/**'
              - 'shared/testutil/kafka/**'
            orders:
              - 'services/orders/**'
              - 'shared/proto/**'
              - 'shared/messaging/**'
              - 'shared/testutil/postgres/**'
              - 'shared/testutil/kafka/**'
            payment:
              - 'services/payment/**'
              - 'shared/proto/**'
              - 'shared/messaging/**'
              - 'shared/testutil/postgres/**'
              - 'shared/testutil/kafka/**'
            cart:
              - 'services/cart/**'
              - 'shared/proto/**'
              - 'shared/testutil/redis/**'
            web:
              - 'services/web/**'
              - 'shared/proto/**'
              - 'shared/auth/**'
            helm:
              - 'infra/charts/**'

  test:
    needs: changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - users
          - products
          - orders
          - payment
          - cart
          - web
    steps:
      - name: Skip when path filter does not match
        if: needs.changes.outputs[matrix.service] != 'true'
        run: echo "Skipping tests for ${{ matrix.service }}"

      - uses: actions/checkout@v4
        if: needs.changes.outputs[matrix.service] == 'true'

      - uses: actions/setup-go@v5
        if: needs.changes.outputs[matrix.service] == 'true'
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Test ${{ matrix.service }}
        if: needs.changes.outputs[matrix.service] == 'true'
        working-directory: services/${{ matrix.service }}
        run: go test ./...

  helm:
    needs: changes
    if: needs.changes.outputs.helm == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.17.3
      - name: Helm lint and template
        run: |
          set -euo pipefail
          namespace=ecommerce
          charts=(
            infra/charts/refurbished-marketplace
            infra/charts/kafka
          )
          for chart in "${charts[@]}"; do
            helm lint "$chart"
            helm template test-release "$chart" --namespace "$namespace" > "/tmp/$(basename "$chart").yaml"
          done
      - name: Set up kubeconform
        uses: bmuschko/setup-kubeconform@v1
        with:
          kubeconform-version: "0.6.7"
      - name: Kubeconform
        run: |
          set -euo pipefail
          kubeconform -summary -ignore-missing-schemas \
            /tmp/refurbished-marketplace.yaml \
            /tmp/kafka.yaml
