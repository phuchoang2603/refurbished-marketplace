    dbName: users_db
    driver: postgresql
    host: 127.0.0.1
    params:
      sslmode: disable
    port: 5432
    proto: tcp
    user: users_app
    passwd: users_app_dev_password
  - alias: products
    dbName: products_db
    driver: postgresql
    host: 127.0.0.1
    params:
      sslmode: disable
    port: 5433
    proto: tcp
    user: products_app
    passwd: products_app_dev_password
  - alias: orders
    dbName: orders_db
    driver: postgresql
    host: 127.0.0.1
    params:
      sslmode: disable
    port: 5434
    proto: tcp
    user: orders_app
    passwd: orders_app_dev_password
  - alias: payment
    dbName: payment_db
    driver: postgresql
    host: 127.0.0.1
    params:
      sslmode: disable
    port: 5436
    proto: tcp
    user: payment_app
    passwd: payment_app_dev_password
lowercaseKeywords: false
