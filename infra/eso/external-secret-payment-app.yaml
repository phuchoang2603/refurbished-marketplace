apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: payment-app
  namespace: ecommerce
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler
  target:
    name: payment-app
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
      engineVersion: v2
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: PAYMENT_APP_USERNAME
    - secretKey: password
      remoteRef:
        key: PAYMENT_APP_PASSWORD
