apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: local-root
  namespace: argo-cd
  finalizers:
    - resources-finalizer.argocd.argoproj.io/foreground
spec:
  project: default
  source:
    repoURL: https://github.com/phuchoang2603/refurbished-marketplace.git
    targetRevision: main
    path: infra/argocd/app-of-apps
    helm:
      values: |
        namePrefix: local
        marketplace:
          enabled: false
      parameters:
        - name: targetRevision
          value: $ARGOCD_APP_SOURCE_TARGET_REVISION
  destination:
    server: https://kubernetes.default.svc
    namespace: argo-cd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
