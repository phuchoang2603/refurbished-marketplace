apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: staging-ztunnel
  finalizers:
    - resources-finalizer.argocd.argoproj.io/foreground
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/phuchoang2603/refurbished-marketplace.git
    targetRevision: add-istio-ingress
    path: infra/charts/operators/istio/ztunnel
    helm:
      releaseName: ztunnel
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
