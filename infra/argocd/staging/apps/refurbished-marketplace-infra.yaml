apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: staging-refurbished-marketplace-infra
  finalizers:
    - resources-finalizer.argocd.argoproj.io/foreground
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/phuchoang2603/refurbished-marketplace.git
    targetRevision: fix/argocd-staging-debug
    path: infra/charts/refurbished-marketplace-infra
    helm:
      releaseName: refurbished-marketplace-infra
      valueFiles:
        - ../refurbished-marketplace/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: ecommerce
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
