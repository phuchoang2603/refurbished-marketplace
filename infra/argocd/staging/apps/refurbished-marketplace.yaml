apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: staging-refurbished-marketplace
  finalizers:
    - resources-finalizer.argocd.argoproj.io/foreground
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://github.com/phuchoang2603/refurbished-marketplace.git
    targetRevision: main
    path: infra/charts/refurbished-marketplace
    helm:
      releaseName: refurbished-marketplace
      values: |
        global:
          imageRegistry: ghcr.io/phuchoang2603/refurbished-marketplace
          imageTag: main
        mesh:
          ambient:
            enabled: true
          waypoint:
            enabled: true
        services:
          web:
            env:
              HOSTED_PAYMENT_BASE_URL: http://payment-gateway-simulator:8097
          payment-gateway-simulator:
            enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: ecommerce
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
