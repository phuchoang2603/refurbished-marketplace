apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: staging-root
  namespace: argo-cd
  finalizers:
    - resources-finalizer.argocd.argoproj.io/foreground
spec:
  project: default
  source:
    repoURL: https://github.com/phuchoang2603/refurbished-marketplace.git
    # Debug: track this branch until merged to main, then set back to main.
    targetRevision: fix/argocd-staging-debug
    path: infra/argocd/staging/apps
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argo-cd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
