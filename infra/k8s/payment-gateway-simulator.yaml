apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-gateway-simulator
  namespace: ecommerce
  labels:
    app: payment-gateway-simulator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-gateway-simulator
  template:
    metadata:
      labels:
        app: payment-gateway-simulator
    spec:
      containers:
        - name: payment-gateway-simulator
          image: refurbished-marketplace/payment-gateway-simulator
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8097
---
apiVersion: v1
kind: Service
metadata:
  name: payment-gateway-simulator
  namespace: ecommerce
  labels:
    app: payment-gateway-simulator
spec:
  selector:
    app: payment-gateway-simulator
  ports:
    - name: http
      port: 8097
      targetPort: 8097
