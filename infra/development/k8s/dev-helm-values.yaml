global:
  imagePullPolicy: IfNotPresent

services:
  web:
    enabled: true
    image: refurbished-marketplace/web
    port: 8080

  users:
    enabled: true
    image: refurbished-marketplace/users
    port: 9091
    auth:
      secretName: users-auth
      secretKey: JWT_SECRET
    migration:
      enabled: true
      image: refurbished-marketplace/users-migrator
    db:
      host: users-db-rw
      port: 5432
      name: users_db
      owner: users_app
      secretName: users-app
      usernameKey: username
      passwordKey: password
      instances: 1
      storageSize: 1Gi

  products:
    enabled: true
    image: refurbished-marketplace/products
    port: 9092
    migration:
      enabled: true
      image: refurbished-marketplace/products-migrator
    db:
      host: products-db-rw
      port: 5432
      name: products_db
      owner: products_app
      secretName: products-app
      usernameKey: username
      passwordKey: password
      instances: 1
      storageSize: 1Gi

  orders:
    enabled: true
    image: refurbished-marketplace/orders
    port: 8083
    migration:
      enabled: false
      image: ghcr.io/kukymbr/goose-docker:3.27.0
    db:
      host: orders-db-rw
      port: 5432
      name: orders_db
      owner: orders_app
      secretName: orders-app
      usernameKey: username
      passwordKey: password
      instances: 1
      storageSize: 1Gi
