global:
  imagePullPolicy: IfNotPresent

services:
  web:
    enabled: true
    image: refurbished-marketplace/web
    port: 8080
    auth:
      secretName: users-auth
      secretKey: JWT_SECRET
    env:
      USERS_SVC_ADDR: users:9091
      PRODUCTS_SVC_ADDR: products:9092
      ORDERS_SVC_ADDR: orders:9093
      CART_SVC_ADDR: cart:9094

  users:
    enabled: true
    image: refurbished-marketplace/users
    port: 9091
    auth:
      secretName: users-auth
      secretKey: JWT_SECRET
    migration:
      enabled: true
      image: refurbished-marketplace/users-migrator
    db:
      host: users-db-rw
      port: 5432
      name: users_db
      owner: users_app
      secretName: users-app
      usernameKey: username
      passwordKey: password
      instances: 1
      storageSize: 1Gi

  products:
    enabled: true
    image: refurbished-marketplace/products
    port: 9092
    migration:
      enabled: true
      image: refurbished-marketplace/products-migrator
    db:
      host: products-db-rw
      port: 5432
      name: products_db
      owner: products_app
      secretName: products-app
      usernameKey: username
      passwordKey: password
      instances: 1
      storageSize: 1Gi

  orders:
    enabled: true
    image: refurbished-marketplace/orders
    port: 9093
    migration:
      enabled: true
      image: refurbished-marketplace/orders-migrator
    db:
      host: orders-db-rw
      port: 5432
      name: orders_db
      owner: orders_app
      secretName: orders-app
      usernameKey: username
      passwordKey: password
      instances: 1
      storageSize: 1Gi

  cart:
    enabled: true
    image: refurbished-marketplace/cart
    port: 9094
    env:
      REDIS_ADDR: 127.0.0.1:6379

  inventory:
    enabled: true
    image: refurbished-marketplace/inventory
    port: 9095
    migration:
      enabled: true
      image: refurbished-marketplace/inventory-migrator
    db:
      host: inventory-db-rw
      port: 5432
      name: inventory_db
      owner: inventory_app
      secretName: inventory-app
      usernameKey: username
      passwordKey: password
      instances: 1
      storageSize: 1Gi

messaging:
  kafkaClusterName: ecommerce-kafka-cluster
  connectClusterName: ecommerce-connect-cluster
  debeziumConnectorVersion: 3.5.0.Final
  kafka:
    version: 4.2.0
    metadataVersion: 4.2-IV1
    replicas: 1
    replicationFactor: 1
    minInsyncReplicas: 1
    storage:
      size: 10Gi
  entities:
    orders:
      topic:
        name: orders.created
        partitions: 1
        replicas: 1
      connector:
        name: orders-outbox
        sourceSecretName: orders-app
        databaseName: orders_db
        databaseHost: orders-db-rw
        databasePort: 5432
        outboxTable: public.orders_outbox
