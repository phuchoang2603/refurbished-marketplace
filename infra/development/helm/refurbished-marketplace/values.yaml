global:
  imagePullPolicy: IfNotPresent

services:
  users:
    enabled: true
    namespace: users
    image: refurbished-marketplace/users
    port: 8081
    auth:
      secretName: users-auth
      secretKey: JWT_SECRET
    migration:
      enabled: true
      image: refurbished-marketplace/users-migrator
    db:
      host: users-db-rw
      port: 5432
      name: users_db
      secretName: users-app
      usernameKey: username
      passwordKey: password
  products:
    enabled: true
    namespace: products
    image: refurbished-marketplace/products
    port: 8082
    migration:
      enabled: false
      image: ghcr.io/kukymbr/goose-docker:3.27.0
    db:
      host: products-db-rw
      port: 5432
      name: products_db
      secretName: products-app
      usernameKey: username
      passwordKey: password
  orders:
    enabled: true
    namespace: orders
    image: refurbished-marketplace/orders
    port: 8083
    migration:
      enabled: false
      image: ghcr.io/kukymbr/goose-docker:3.27.0
    db:
      host: orders-db-rw
      port: 5432
      name: orders_db
      secretName: orders-app
      usernameKey: username
      passwordKey: password

databases:
  users:
    enabled: true
    namespace: users
    dbName: users_db
    owner: users_app
    appSecretName: users-app
    instances: 1
    storage:
      size: 1Gi
  products:
    enabled: true
    namespace: products
    dbName: products_db
    owner: products_app
    appSecretName: products-app
    instances: 1
    storage:
      size: 1Gi
  orders:
    enabled: true
    namespace: orders
    dbName: orders_db
    owner: orders_app
    appSecretName: orders-app
    instances: 1
    storage:
      size: 1Gi
