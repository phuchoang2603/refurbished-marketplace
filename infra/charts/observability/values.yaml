victoria-metrics-k8s-stack:
  fullnameOverride: vmks

  defaultDashboards:
    enabled: true
    annotations:
      argocd.argoproj.io/sync-options: ServerSideApply=true

  # Upstream renders vmks-sync-job as a Helm hook, which Argo CD does not run.
  # The wrapper chart creates an equivalent PostSync Job instead.
  syncJob:
    createJob: false

  grafana:
    enabled: true
    plugins:
      - victoriametrics-logs-datasource
    persistence:
      enabled: false

  victoria-metrics-operator:
    crds:
      cleanup:
        enabled: false

  alertmanager:
    enabled: true

  vmsingle:
    enabled: true
    spec:
      retentionPeriod: 7d
      storage:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi

  vmcluster:
    enabled: false

  vlsingle:
    enabled: true
    spec:
      retentionPeriod: 3d
      storage:
        resources:
          requests:
            storage: 5Gi

  vlcluster:
    enabled: false

  vlagent:
    enabled: true
    spec:
      k8sCollector:
        enabled: true

  vtsingle:
    enabled: true
    spec:
      retentionPeriod: 3d
      storage:
        resources:
          requests:
            storage: 2Gi

  vtcluster:
    enabled: false

# Wrapper-owned dashboard/rules sync job for Argo CD PostSync.
dashboardSyncJob:
  enabled: true

# Scrape Istio ambient control plane + waypoint L7 metrics into VMSingle.
istioScrapes:
  enabled: true
  waypointName: ecommerce-waypoint
  waypointNamespaces:
    - ecommerce
