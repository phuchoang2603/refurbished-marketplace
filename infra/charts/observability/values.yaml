# Chart defaults = local Colima, apps-only signals:
# - metrics: Istio waypoint + ingress scrapes (ecommerce) → VMSingle
# - traces: VTSingle OTLP for marketplace services
# - logs: VLAgent filtered to ecommerce (+ kafka) → VLSingle
# No node-exporter, kube-state-metrics, Alertmanager, or default K8s dashboards.
# Staging overlays values-staging.yaml for full platform stack.
victoria-metrics-k8s-stack:
  fullnameOverride: vmks

  defaultDashboards:
    enabled: false

  # Upstream renders vmks-sync-job as a Helm hook, which Argo CD does not run.
  # The wrapper chart creates an equivalent PostSync Job instead.
  syncJob:
    createJob: false

  grafana:
    enabled: true
    plugins:
      - victoriametrics-logs-datasource
    persistence:
      enabled: false
    # Traces Drilldown / TraceQL UI is memory-heavy; 192Mi OOMKilled (exit 137)
    # on drilldown. Give it headroom.
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

  victoria-metrics-operator:
    crds:
      cleanup:
        enabled: false
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  alertmanager:
    enabled: false

  # Needs Alertmanager; enable in values-staging.yaml.
  vmalert:
    enabled: false

  vmsingle:
    enabled: true
    spec:
      retentionPeriod: 1d
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
      storage:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi

  vmcluster:
    enabled: false

  vlsingle:
    enabled: true
    spec:
      retentionPeriod: 1d
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 192Mi
      storage:
        resources:
          requests:
            storage: 1Gi

  vlcluster:
    enabled: false

  vmagent:
    enabled: true
    spec:
      # Pick up wrapper-owned Istio VMPodScrapes only (no node/ksm scrapes locally).
      selectAllByDefault: true
      podScrapeNamespaceSelector: {}
      podScrapeSelector: {}
      serviceScrapeNamespaceSelector: {}
      serviceScrapeSelector: {}
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi

  vlagent:
    enabled: true
    spec:
      k8sCollector:
        enabled: true
        # Skip every namespace except marketplace apps + Kafka Connect.
        excludeFilter: "not kubernetes.pod_namespace:in(ecommerce, kafka)"
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi

  vtsingle:
    enabled: true
    spec:
      retentionPeriod: 1d
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 192Mi
      storage:
        resources:
          requests:
            storage: 1Gi

  vtcluster:
    enabled: false

  prometheus-node-exporter:
    enabled: false

  kube-state-metrics:
    enabled: false

# Wrapper-owned dashboard/rules sync job for Argo CD PostSync.
dashboardSyncJob:
  enabled: false

# Scrape Istio ambient control plane + waypoint L7 metrics into VMSingle.
istioScrapes:
  enabled: true
  waypointName: ecommerce-waypoint
  waypointNamespaces:
    - ecommerce
