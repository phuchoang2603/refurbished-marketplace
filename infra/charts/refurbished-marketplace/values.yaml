global:
  imagePullPolicy: IfNotPresent
  imageRegistry: ""
  imageTag: ""

# Chart defaults = local Colima (ambient + ingress via Cloudflare Tunnel .dev hosts).
# Staging overlays values-staging.yaml via Argo CD valueFiles.
mesh:
  ambient:
    enabled: true
  waypoint:
    enabled: true
    name: ecommerce-waypoint
  tracing:
    enabled: true
    samplingPercentage: 100

# North-south edge via Kubernetes Gateway API (gatewayClassName: istio).
# Local uses Cloudflare Tunnel → ClusterIP Gateway (same path as staging).
ingress:
  enabled: true
  name: ecommerce-ingress
  port: 80
  webHostname: shop-dev.phuchoang.sbs
  simulatorHostname: pay-dev.phuchoang.sbs

# Default container resources (overridable per service).
# Sized for Colima 4 CPU / 8 GiB; staging overlays via values-staging.yaml.
defaults:
  otel:
    # Local Colima / staging both use in-cluster VictoriaTraces OTLP gRPC.
    endpoint: vtsingle-vmks.monitoring.svc.cluster.local:4317
  resources:
    requests:
      cpu: 10m
      memory: 24Mi
    limits:
      cpu: 100m
      memory: 96Mi
  initResources:
    requests:
      cpu: 5m
      memory: 8Mi
    limits:
      cpu: 50m
      memory: 32Mi
  migrationResources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
  redisResources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
  dbResources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 192Mi

externalSecrets:
  enabled: true
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler

services:
  web:
    enabled: true
    image: web
    port: 8080
    protocol: http
    auth:
      secretName: users-auth
      secretKey: JWT_SECRET
    env:
      USERS_SVC_ADDR: users:9091
      PRODUCTS_SVC_ADDR: products:9092
      ORDERS_SVC_ADDR: orders:9093
      CART_SVC_ADDR: cart:9094
      PAYMENT_SVC_ADDR: payment:9096
      # Browser-facing URLs via local Cloudflare Tunnel (.dev hosts).
      HOSTED_PAYMENT_BASE_URL: https://pay-dev.phuchoang.sbs
      PUBLIC_BASE_URL: https://shop-dev.phuchoang.sbs
      HOSTED_PAYMENT_CALLBACK_BASE_URL: http://web:8080

  users:
    enabled: true
    image: users
    port: 9091
    protocol: grpc
    auth:
      secretName: users-auth
      secretKey: JWT_SECRET
    migration:
      enabled: true
      image: users-migrator
    db:
      host: users-db-rw
      port: 5432
      name: users_db
      owner: users_app
      secretName: users-app
      usernameKey: username
      passwordKey: password
      instances: 1
      storageSize: 512Mi

  products:
    enabled: true
    image: products
    port: 9092
    protocol: grpc
    env:
      KAFKA_BOOTSTRAP_SERVERS: ecommerce-kafka-cluster-kafka-bootstrap.kafka.svc:9092
    migration:
      enabled: true
      image: products-migrator
    db:
      host: products-db-rw
      port: 5432
      name: products_db
      owner: products_app
      secretName: products-app
      usernameKey: username
      passwordKey: password
      instances: 1
      storageSize: 512Mi

  orders:
    enabled: true
    image: orders
    port: 9093
    protocol: grpc
    env:
      KAFKA_BOOTSTRAP_SERVERS: ecommerce-kafka-cluster-kafka-bootstrap.kafka.svc:9092
    migration:
      enabled: true
      image: orders-migrator
    db:
      host: orders-db-rw
      port: 5432
      name: orders_db
      owner: orders_app
      secretName: orders-app
      usernameKey: username
      passwordKey: password
      instances: 1
      storageSize: 512Mi

  cart:
    enabled: true
    image: cart
    port: 9094
    protocol: grpc
    env:
      REDIS_ADDR: 127.0.0.1:6379

  payment:
    enabled: true
    image: payment
    port: 9096
    protocol: grpc
    env:
      KAFKA_BOOTSTRAP_SERVERS: ecommerce-kafka-cluster-kafka-bootstrap.kafka.svc:9092
    migration:
      enabled: true
      image: payment-migrator
    db:
      host: payment-db-rw
      port: 5432
      name: payment_db
      owner: payment_app
      secretName: payment-app
      usernameKey: username
      passwordKey: password
      instances: 1
      storageSize: 512Mi

  payment-gateway-simulator:
    enabled: true
    image: payment-gateway-simulator
    port: 8097
    protocol: http
