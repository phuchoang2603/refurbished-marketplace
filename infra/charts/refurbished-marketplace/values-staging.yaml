# Staging overlays on values.yaml (Argo CD valueFiles).
global:
  imageRegistry: ghcr.io/phuchoang2603/refurbished-marketplace
  imageTag: main

defaults:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi
  initResources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 100m
      memory: 64Mi
  migrationResources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  redisResources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  dbResources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

ingress:
  enabled: true
  name: ecommerce-ingress
  port: 80
  webHostname: shop.phuchoang.sbs
  simulatorHostname: pay.phuchoang.sbs

services:
  web:
    env:
      HOSTED_PAYMENT_BASE_URL: https://pay.phuchoang.sbs
      PUBLIC_BASE_URL: https://shop.phuchoang.sbs
      # Server-side simulator→web callback stays on cluster DNS.
      HOSTED_PAYMENT_CALLBACK_BASE_URL: http://web:8080
  users:
    db:
      storageSize: 1Gi
  products:
    db:
      storageSize: 1Gi
  orders:
    db:
      storageSize: 1Gi
  payment:
    db:
      storageSize: 1Gi
