global:
  imageRegistry: ""
  imageTag: ""

# Namespace that hosts marketplace CNPG databases and app secrets
# (orders-app, payment-app, products-app). Kafka itself deploys to Release.Namespace.
appNamespace: ecommerce

kafka:
  clusterName: ecommerce-kafka-cluster
  version: 4.2.0
  metadataVersion: 4.2-IV1
  replicas: 1
  replicationFactor: 1
  minInsyncReplicas: 1
  storage:
    size: 5Gi
  # Colima-friendly broker JVM / requests (staging overlays values-staging.yaml).
  jvmOptions:
    "-Xms": 256m
    "-Xmx": 256m
  resources:
    requests:
      cpu: 50m
      memory: 384Mi
    limits:
      cpu: 500m
      memory: 512Mi
connect:
  clusterName: ecommerce-connect-cluster
  image: connect-debezium
  # Keep enough heap for Debezium plugin scan; still below prior 512m/768Mi local burn.
  jvmOptions:
    "-Xms": 256m
    "-Xmx": 256m
  # spec.tracing (Strimzi OTEL java agent) adds ~200Mi of non-heap overhead
  # (agent + metaspace + direct buffers); 512Mi limit caused repeated OOMKills.
  resources:
    requests:
      cpu: 50m
      memory: 512Mi
    limits:
      memory: 768Mi
  livenessProbe:
    initialDelaySeconds: 180
    timeoutSeconds: 5
    periodSeconds: 10
    failureThreshold: 6
  readinessProbe:
    initialDelaySeconds: 120
    timeoutSeconds: 5
    periodSeconds: 10
    failureThreshold: 12
entities:
  orders:
    topics:
      - name: orders.created
        partitions: 1
        retention: 86400000 # 1 day local
    connector:
      name: orders-outbox
      sourceSecretName: orders-app
      databaseName: orders_db
      databaseHost: orders-db-rw
      databasePort: 5432
      outboxTable: public.orders_outbox
      publicationAutocreateMode: filtered
  payment:
    topics:
      - name: payment.succeeded
        partitions: 1
        retention: 86400000
      - name: payment.failed
        partitions: 1
        retention: 86400000
    connector:
      name: payment-outbox
      sourceSecretName: payment-app
      databaseName: payment_db
      databaseHost: payment-db-rw
      databasePort: 5432
      outboxTable: public.payment_outbox
      publicationAutocreateMode: filtered
  inventory:
    topics:
      - name: inventory.reserved
        partitions: 1
        retention: 86400000
      - name: inventory.reservation-failed
        partitions: 1
        retention: 86400000
    connector:
      name: inventory-outbox
      sourceSecretName: products-app
      databaseName: products_db
      databaseHost: products-db-rw
      databasePort: 5432
      outboxTable: public.inventory_outbox
      publicationAutocreateMode: filtered
provectus:
  enabled: false
  name: kafka-ui
  image: provectuslabs/kafka-ui:v0.7.2
  port: 8080
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
