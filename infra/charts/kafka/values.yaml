global:
  imageRegistry: ""
  imageTag: ""

# Namespace that hosts marketplace CNPG databases and app secrets
# (orders-app, payment-app, products-app). Kafka itself deploys to Release.Namespace.
appNamespace: ecommerce

kafka:
  clusterName: ecommerce-kafka-cluster
  version: 4.2.0
  metadataVersion: 4.2-IV1
  replicas: 1
  replicationFactor: 1
  minInsyncReplicas: 1
  storage:
    size: 10Gi
  # Sized from staging usage (~535Mi / ~60m) with JVM headroom.
  resources:
    requests:
      cpu: 250m
      memory: 768Mi
    limits:
      cpu: "1"
      memory: 1536Mi
  entityOperator:
    topicOperator:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
    userOperator:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
connect:
  clusterName: ecommerce-connect-cluster
  image: connect-debezium
  # Connect needs real CPU headroom: a 500m limit made the JVM see os.vcpus=1
  # and fail liveness (/health) before startup finished.
  resources:
    requests:
      cpu: 500m
      memory: 768Mi
    limits:
      cpu: "2"
      memory: 1536Mi
  livenessProbe:
    initialDelaySeconds: 120
    timeoutSeconds: 10
    periodSeconds: 10
    failureThreshold: 30
  readinessProbe:
    initialDelaySeconds: 120
    timeoutSeconds: 10
    periodSeconds: 10
    failureThreshold: 30
entities:
  orders:
    topics:
      - name: orders.created
        partitions: 10
        retention: 604800000 # 7 days
    connector:
      name: orders-outbox
      sourceSecretName: orders-app
      databaseName: orders_db
      databaseHost: orders-db-rw
      databasePort: 5432
      outboxTable: public.orders_outbox
      publicationAutocreateMode: filtered
  payment:
    topics:
      - name: payment.succeeded
        partitions: 6
        retention: 604800000
      - name: payment.failed
        partitions: 6
        retention: 604800000
    connector:
      name: payment-outbox
      sourceSecretName: payment-app
      databaseName: payment_db
      databaseHost: payment-db-rw
      databasePort: 5432
      outboxTable: public.payment_outbox
      publicationAutocreateMode: filtered
  inventory:
    topics:
      - name: inventory.reserved
        partitions: 6
        retention: 604800000
      - name: inventory.reservation-failed
        partitions: 6
        retention: 604800000
    connector:
      name: inventory-outbox
      sourceSecretName: products-app
      databaseName: products_db
      databaseHost: products-db-rw
      databasePort: 5432
      outboxTable: public.inventory_outbox
      publicationAutocreateMode: filtered
provectus:
  enabled: true
  name: kafka-ui
  image: provectuslabs/kafka-ui:v0.7.2
  port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 384Mi
