# Chart defaults = local Colima (tiny footprints). Staging overlays values-staging.yaml.
istiod:
  profile: ambient
  autoscaleEnabled: false
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  meshConfig:
    extensionProviders:
      - name: otel-vt
        opentelemetry:
          port: 4317
          service: vtsingle-vmks.monitoring.svc.cluster.local
  global:
    proxy:
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          cpu: 500m
          memory: 256Mi
    waypoint:
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 500m
          memory: 256Mi
