# Chart defaults = local Colima (tiny footprints). Staging overlays values-staging.yaml.
istiod:
  profile: ambient
  autoscaleEnabled: false
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  meshConfig:
    # Prefer HTTP OTLP on VT's :10428. Envoy's gRPC OTEL exporter to :4317 was
    # connecting but failing every request (rq_error, rq_success=0) from ambient
    # waypoint/ingress — HTTP path is the documented VT ingest that works.
    extensionProviders:
      - name: otel-vt
        opentelemetry:
          port: 10428
          service: vtsingle-vmks.monitoring.svc.cluster.local
          http:
            path: "/insert/opentelemetry/v1/traces"
            timeout: 5s
  global:
    proxy:
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          cpu: 500m
          memory: 256Mi
    waypoint:
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 500m
          memory: 256Mi
