# Chart defaults = local Colima/k3s. Staging overlays values-staging.yaml.
# See https://istio.io/latest/docs/ambient/install/platform-prerequisites/
cni:
  profile: ambient
  global:
    platform: k3s
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
