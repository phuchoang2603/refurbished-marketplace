external-secrets:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
  webhook:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi
  certController:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi

clusterSecretStore:
  enabled: true
  name: doppler
  dopplerToken:
    secretName: doppler-token
    secretKey: dopplerToken
    namespace: operators
