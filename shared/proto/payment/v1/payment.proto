syntax = "proto3";

package payment.v1;

option go_package = "refurbished-marketplace/shared/proto/payment/v1;paymentv1";

import "google/protobuf/timestamp.proto";

service PaymentService {
  // Called by the web edge when the user submits payment details on the order
  // confirmation screen. Payment stores the intent and will correlate it with
  // `orders.item.created` events by `order_id`.
  rpc InitiatePayment(InitiatePaymentRequest) returns (InitiatePaymentResponse);

  // Called by the web edge webhook handler when the external gateway/simulator
  // posts an asynchronous result.
  rpc HandleGatewayWebhook(HandleGatewayWebhookRequest) returns (HandleGatewayWebhookResponse);

  // Optional: used for polling/debugging.
  rpc GetTransaction(GetTransactionRequest) returns (PaymentTransaction);
}

enum PaymentTransactionStatus {
  PAYMENT_TRANSACTION_STATUS_UNSPECIFIED = 0;
  PAYMENT_TRANSACTION_STATUS_INITIALIZED = 1;
  PAYMENT_TRANSACTION_STATUS_SUBMITTED = 2;
  PAYMENT_TRANSACTION_STATUS_SUCCEEDED = 3;
  PAYMENT_TRANSACTION_STATUS_FAILED = 4;
}

message Address {
  string name = 1;
  string line1 = 2;
  string line2 = 3;
  string city = 4;
  string region = 5;
  string postal_code = 6;
  string country = 7;
}

message InitiatePaymentRequest {
  string order_id = 1;
  string buyer_user_id = 2;
  string payment_token = 3;
  string currency = 4;
  Address billing_address = 5;
  Address shipping_address = 6;
}

message InitiatePaymentResponse {
  string order_id = 1;
}

message HandleGatewayWebhookRequest {
  // Internal transaction ID generated by payment service.
  string payment_transaction_id = 1;

  // Gateway-specific ID for debugging/idempotency.
  string gateway_transaction_id = 2;

  PaymentTransactionStatus status = 3;
  string failure_reason = 4;
}

message HandleGatewayWebhookResponse {}

message GetTransactionRequest {
  string payment_transaction_id = 1;
}

message PaymentTransaction {
  string id = 1;
  string order_id = 2;
  string order_item_id = 3;
  string merchant_id = 4;
  int64 amount_cents = 5;
  string currency = 6;
  PaymentTransactionStatus status = 7;
  string idempotency_key = 8;
  string gateway_transaction_id = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

