syntax = "proto3";

package payment.v1;

option go_package = "refurbished-marketplace/shared/proto/payment/v1;paymentv1";

service PaymentService {
  // Called by the web edge after order creation so payment can create or reuse
  // a hosted payment session for that order.
  rpc CreateHostedPaymentSession(CreateHostedPaymentSessionRequest)
      returns (CreateHostedPaymentSessionResponse);

  rpc GetHostedPaymentSessionByOrder(GetHostedPaymentSessionByOrderRequest)
      returns (HostedPaymentSession);

  // Called by the web edge when a hosted gateway posts a terminal payment outcome.
  rpc HandleGatewayWebhook(HandleGatewayWebhookRequest)
      returns (HandleGatewayWebhookResponse);
}

enum HostedPaymentSessionStatus {
  HOSTED_PAYMENT_SESSION_STATUS_UNSPECIFIED = 0;
  HOSTED_PAYMENT_SESSION_STATUS_PENDING = 1;
  HOSTED_PAYMENT_SESSION_STATUS_SUCCEEDED = 2;
  HOSTED_PAYMENT_SESSION_STATUS_FAILED = 3;
  HOSTED_PAYMENT_SESSION_STATUS_CANCELLED = 4;
  HOSTED_PAYMENT_SESSION_STATUS_EXPIRED = 5;
}

message Address {
  string name = 1;
  string line1 = 2;
  string line2 = 3;
  string city = 4;
  string region = 5;
  string postal_code = 6;
  string country = 7;
}

message CreateHostedPaymentSessionRequest {
  string order_id = 1;
  string buyer_user_id = 2;
  string currency = 3;
  Address shipping_address = 4;
  string return_url = 5;
  string cancel_url = 6;
}

message CreateHostedPaymentSessionResponse {
  string order_id = 1;
  string payment_session_id = 2;
  string return_url = 3;
  string cancel_url = 4;
}

message GetHostedPaymentSessionByOrderRequest { string order_id = 1; }

message HostedPaymentSession {
  HostedPaymentSessionStatus status = 1;
  string failure_reason = 2;
}

message HandleGatewayWebhookRequest {
  string order_id = 1;
  string payment_session_id = 2;
  HostedPaymentSessionStatus status = 3;
  string failure_reason = 4;
}

message HandleGatewayWebhookResponse {}
