syntax = "proto3";

package products.v1;

option go_package = "refurbished-marketplace/shared/proto/products/v1;productsv1";

import "google/protobuf/timestamp.proto";

service ProductsService {
  rpc CreateProduct(CreateProductRequest) returns (Product);
  rpc GetProductByID(GetProductByIDRequest) returns (Product);
  rpc ListProducts(ListProductsRequest) returns (ListProductsResponse);
  rpc UpdateProduct(UpdateProductRequest) returns (Product);
  rpc DeleteProduct(DeleteProductRequest) returns (DeleteProductResponse);
}

message Product {
  string id = 1;
  string owner_user_id = 2;
  string name = 3;
  string description = 4;
  int64 price_cents = 5;
  int32 stock = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message CreateProductRequest {
  string owner_user_id = 1;
  string name = 2;
  string description = 3;
  int64 price_cents = 4;
  int32 stock = 5;
}

message GetProductByIDRequest {
  string id = 1;
}

message ListProductsRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message ListProductsResponse {
  repeated Product products = 1;
}

message UpdateProductRequest {
  string id = 1;
  string owner_user_id = 2;
  optional string name = 3;
  optional string description = 4;
  optional int64 price_cents = 5;
  optional int32 stock = 6;
}

message DeleteProductRequest {
  string id = 1;
  string owner_user_id = 2;
}

message DeleteProductResponse {}
