syntax = "proto3";

package products.v1;

option go_package = "refurbished-marketplace/shared/proto/products/v1;productsv1";

// Emitted on inventory.reserved after the full order reservation succeeds.
message InventoryReserved {
  string order_id = 1;
  string merchant_id = 2;
  int64 total_cents = 3;
}

// Emitted on inventory.reservation-failed when the order cannot be fully reserved.
message InventoryReservationFailed {
  string order_id = 1;
}
