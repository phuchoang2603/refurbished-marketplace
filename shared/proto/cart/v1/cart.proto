syntax = "proto3";

package cart.v1;

option go_package = "refurbished-marketplace/shared/proto/cart/v1;cartv1";

import "google/protobuf/timestamp.proto";

service CartService {
  rpc GetCart(GetCartRequest) returns (Cart);
  rpc AddCartItem(AddCartItemRequest) returns (Cart);
  rpc SetCartItemQuantity(SetCartItemQuantityRequest) returns (Cart);
  rpc RemoveCartItem(RemoveCartItemRequest) returns (Cart);
  rpc ClearCart(ClearCartRequest) returns (Empty);
}

message Empty {}

message CartItem {
  string product_id = 1;
  int32 quantity = 2;
}

message Cart {
  string cart_id = 1;
  repeated CartItem items = 2;
  google.protobuf.Timestamp created_at = 3;
  google.protobuf.Timestamp updated_at = 4;
}

message GetCartRequest { string cart_id = 1; }

message AddCartItemRequest {
  string cart_id = 1;
  string product_id = 2;
  int32 quantity = 3;
}

message SetCartItemQuantityRequest {
  string cart_id = 1;
  string product_id = 2;
  int32 quantity = 3;
}

message RemoveCartItemRequest {
  string cart_id = 1;
  string product_id = 2;
}

message ClearCartRequest { string cart_id = 1; }
