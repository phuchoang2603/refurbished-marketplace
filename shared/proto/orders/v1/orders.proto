syntax = "proto3";

package orders.v1;

option go_package = "refurbished-marketplace/shared/proto/orders/v1;ordersv1";

import "google/protobuf/timestamp.proto";

service OrdersService {
  rpc CreateOrder(CreateOrderRequest) returns (Order);
  rpc GetOrderByID(GetOrderByIDRequest) returns (Order);
  rpc ListOrdersByBuyer(ListOrdersByBuyerRequest) returns (ListOrdersByBuyerResponse);
  rpc UpdateOrderStatus(UpdateOrderStatusRequest) returns (Order);
}

enum OrderStatus {
  ORDER_STATUS_UNSPECIFIED = 0;
  ORDER_STATUS_PENDING = 1;
  ORDER_STATUS_PAID = 2;
  ORDER_STATUS_FAILED = 3;
}

message OrderItem {
  string id = 1;
  string order_id = 2;
  string product_id = 3;
  string merchant_id = 4;
  int32 quantity = 5;
  int64 unit_price_cents = 6;
  int64 line_total_cents = 7;
  google.protobuf.Timestamp created_at = 8;
}

message Order {
  string id = 1;
  string buyer_user_id = 2;
  OrderStatus status = 3;
  int64 total_cents = 4;
  repeated OrderItem items = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message CreateOrderItem {
  string product_id = 1;
  string merchant_id = 2;
  int32 quantity = 3;
  int64 unit_price_cents = 4;
}

message CreateOrderRequest {
  string buyer_user_id = 1;
  repeated CreateOrderItem items = 2;
  int64 total_cents = 3;
}

message GetOrderByIDRequest {
  string id = 1;
}

message ListOrdersByBuyerRequest {
  string buyer_user_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message ListOrdersByBuyerResponse {
  repeated Order orders = 1;
}

message UpdateOrderStatusRequest {
  string id = 1;
  OrderStatus status = 2;
}
